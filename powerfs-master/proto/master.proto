syntax = "proto3";

package powerfs;

service MasterService {
    rpc SendHeartbeat(stream Heartbeat) returns (stream HeartbeatResponse);
    rpc KeepConnected(stream KeepConnectedRequest) returns (stream KeepConnectedResponse);
    rpc LookupVolume(LookupVolumeRequest) returns (LookupVolumeResponse);
    rpc Assign(AssignRequest) returns (AssignResponse);
    rpc VolumeList(VolumeListRequest) returns (VolumeListResponse);
    rpc VolumeGrow(VolumeGrowRequest) returns (VolumeGrowResponse);
    rpc Ping(PingRequest) returns (PingResponse);
    
    // Collection management
    rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);
    rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteCollectionResponse);
    rpc GetCollection(GetCollectionRequest) returns (GetCollectionResponse);
    rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
    
    // Statistics
    rpc GetStatistics(StatisticsRequest) returns (StatisticsResponse);
    
    // Volume management
    rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);
    
    // Cluster management
    rpc GetClusterInfo(ClusterInfoRequest) returns (ClusterInfoResponse);
    
    // Filer metadata API
    rpc LookupDirectoryEntry(LookupDirectoryEntryRequest) returns (LookupDirectoryEntryResponse);
    rpc GetEntry(GetEntryRequest) returns (GetEntryResponse);
    rpc GetEntryByInode(GetEntryByInodeRequest) returns (GetEntryByInodeResponse);
    rpc CreateEntry(CreateEntryRequest) returns (CreateEntryResponse);
    rpc UpdateEntry(UpdateEntryRequest) returns (UpdateEntryResponse);
    rpc DeleteEntry(DeleteEntryRequest) returns (DeleteEntryResponse);
    rpc RenameEntry(RenameEntryRequest) returns (RenameEntryResponse);
    rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
    rpc StreamMutateEntry(stream MutateEntryRequest) returns (stream MutateEntryResponse);
    rpc SubscribeMetadata(SubscribeMetadataRequest) returns (stream MetadataNotification);
    
    // Delta sync API (Phase 1B)
    rpc PushDelta(PushDeltaRequest) returns (PushDeltaResponse);
    rpc PullDelta(PullDeltaRequest) returns (PullDeltaResponse);
    
    // Lease management for file consistency
    rpc AcquireLease(LeaseRequest) returns (LeaseResponse);
    rpc ReleaseLease(LeaseReleaseRequest) returns (LeaseReleaseResponse);
    rpc RenewLease(LeaseRenewRequest) returns (LeaseRenewResponse);

    // Job-level consistency (Phase 3)
    rpc RegisterJobClient(JobRegistrationRequest) returns (JobRegistrationResponse);
    rpc DeregisterJobClient(JobDeregistrationRequest) returns (JobDeregistrationResponse);
    rpc CompleteJob(JobCompletionRequest) returns (JobCompletionResponse);
    rpc GetJobInfo(JobInfoRequest) returns (JobInfoResponse);
    
    // FUSE client management
    rpc GetFuseClients(FuseClientsRequest) returns (FuseClientsResponse);
}

message Heartbeat {
    string ip = 1;
    uint32 port = 2;
    string public_url = 3;
    uint64 max_file_key = 5;
    string data_center = 6;
    string rack = 7;
    uint32 admin_port = 8;
    repeated VolumeShortInfo volumes = 9;
    repeated VolumeShortInfo new_volumes = 10;
    repeated VolumeShortInfo deleted_volumes = 11;
    bool has_no_volumes = 12;
    uint32 grpc_port = 20;
    string id = 22;
}

message HeartbeatResponse {
    uint64 volume_size_limit = 1;
    string leader = 2;
    string metrics_address = 3;
    uint32 metrics_interval_seconds = 4;
    bool preallocate = 7;
}

message VolumeShortInfo {
    uint32 volume_id = 1;
    uint64 size = 2;
    bool read_only = 3;
    string collection = 4;
    uint32 replica_placement = 5;
    uint32 ttl = 6;
    string disk_type = 7;
}

message Location {
    string url = 1;
    string public_url = 2;
    uint32 grpc_port = 3;
    string data_center = 4;
}

message LookupVolumeRequest {
    repeated string volume_or_file_ids = 1;
    string collection = 2;
}

message LookupVolumeResponse {
    message VolumeIdLocation {
        string volume_or_file_id = 1;
        repeated Location locations = 2;
        string error = 3;
        string auth = 4;
    }
    repeated VolumeIdLocation volume_id_locations = 1;
}

message AssignRequest {
    uint64 count = 1;
    string replication = 2;
    string collection = 3;
    string ttl = 4;
    string data_center = 5;
    string rack = 6;
    string data_node = 7;
    string disk_type = 10;
    uint32 stripe_count = 11;
    uint64 stripe_size = 12;
}

message AssignResponse {
    string fid = 1;
    uint64 count = 4;
    string error = 5;
    string auth = 6;
    repeated Location replicas = 7;
    Location location = 8;
    repeated string stripe_fids = 9;
    repeated Location stripe_locations = 10;
}

message KeepConnectedRequest {
    string client_type = 1;
    string client_address = 3;
    string version = 4;
    string filer_group = 5;
    string data_center = 6;
    string rack = 7;
    string mount_point = 8;
    string collection = 9;
    string replication = 10;
    uint64 pid = 11;
    string host = 12;
    uint64 dirty_chunks = 13;
    uint64 dirty_bytes = 14;
}

message VolumeLocation {
    string url = 1;
    string public_url = 2;
    repeated uint32 new_vids = 3;
    repeated uint32 deleted_vids = 4;
    string leader = 5;
    string data_center = 6;
    uint32 grpc_port = 7;
}

message KeepConnectedResponse {
    VolumeLocation volume_location = 1;
}

message VolumeListRequest {}

message VolumeListResponse {
    message DataNodeInfo {
        string id = 1;
        string address = 2;
        uint32 grpc_port = 3;
        string data_center = 4;
        string rack = 5;
        repeated VolumeShortInfo volumes = 6;
    }
    repeated DataNodeInfo data_nodes = 1;
    uint64 volume_size_limit = 2;
}

message PingRequest {
    string target = 1;
    string target_type = 2;
}

message PingResponse {
    int64 start_time_ns = 1;
    int64 remote_time_ns = 2;
    int64 stop_time_ns = 3;
}

// VolumeGrow: request to allocate new volumes
message VolumeGrowRequest {
    string replication = 1;
    string collection = 2;
    string ttl = 3;
    string data_center = 4;
    string rack = 5;
    string data_node = 6;
    string disk_type = 7;
    uint32 count = 8;  // number of volumes to allocate
}

message VolumeGrowResponse {
    repeated uint32 new_volume_ids = 1;
    repeated Location locations = 2;
    string error = 3;
}

// Collection management messages
message CollectionInfo {
    string name = 1;
    string replication = 2;
    string ttl = 3;
    string disk_type = 4;
    uint64 max_volume_count = 5;
    uint64 volume_count = 6;
    uint64 created_at = 7;
    uint64 modified_at = 8;
}

message CreateCollectionRequest {
    string name = 1;
    string replication = 2;
    string ttl = 3;
    string disk_type = 4;
    uint64 max_volume_count = 5;
}

message CreateCollectionResponse {
    bool success = 1;
    string error = 2;
    CollectionInfo collection = 3;
}

message DeleteCollectionRequest {
    string name = 1;
}

message DeleteCollectionResponse {
    bool success = 1;
    string error = 2;
}

message GetCollectionRequest {
    string name = 1;
}

message GetCollectionResponse {
    bool success = 1;
    string error = 2;
    CollectionInfo collection = 3;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
    repeated CollectionInfo collections = 1;
    string error = 2;
}

// Volume management messages
message DeleteVolumeRequest {
    uint32 volume_id = 1;
}

message DeleteVolumeResponse {
    bool success = 1;
    string error = 2;
}

// Statistics messages
message StatisticsRequest {
    string collection = 1;
    string data_center = 2;
    string rack = 3;
}

message StatisticsResponse {
    // Cluster level
    uint64 total_volume_count = 1;
    uint64 total_node_count = 2;
    uint64 total_data_center_count = 3;
    uint64 total_rack_count = 4;
    
    // Volume level
    uint64 total_volume_size = 5;
    uint64 total_used_size = 6;
    uint64 available_volume_count = 7;
    uint64 full_volume_count = 8;
    uint64 read_only_volume_count = 9;
    
    // Collection level
    repeated CollectionStats collection_stats = 10;
    
    // Data center level
    repeated DataCenterStats data_center_stats = 11;
    
    // Rack level
    repeated RackStats rack_stats = 12;
    
    string error = 13;
}

message CollectionStats {
    string name = 1;
    uint64 volume_count = 2;
    uint64 total_size = 3;
    uint64 used_size = 4;
}

message LeaseRequest {
    string path = 1;
    uint64 duration_ms = 2;
    string client_id = 3;
}

message LeaseResponse {
    bool success = 1;
    string error = 2;
    string lease_id = 3;
    uint64 duration_ms = 4;
    uint64 epoch = 5;  // Master epoch when lease was granted
}

message LeaseReleaseRequest {
    string lease_id = 1;
}

message LeaseReleaseResponse {
    bool success = 1;
    string error = 2;
}

message LeaseRenewRequest {
    string lease_id = 1;
    uint64 duration_ms = 2;
}

message LeaseRenewResponse {
    bool success = 1;
    string error = 2;
    uint64 epoch = 3;
}

// ============================================================
// Job-level consistency (Phase 3)
// ============================================================

message JobContext {
    string job_id = 1;
    string job_name = 2;
    repeated string client_ids = 3;
    uint64 start_time = 4;
    uint64 end_time = 5;
    bool is_active = 6;
}

message JobRegistrationRequest {
    string job_id = 1;
    string job_name = 2;
    string client_id = 3;
}

message JobRegistrationResponse {
    bool success = 1;
    string error = 2;
}

message JobDeregistrationRequest {
    string job_id = 1;
    string client_id = 2;
}

message JobDeregistrationResponse {
    bool success = 1;
    string error = 2;
}

message JobCompletionRequest {
    string job_id = 1;
}

message JobCompletionResponse {
    bool success = 1;
    string error = 2;
    uint64 invalidated_entries = 3;
}

message JobInfoRequest {
    string job_id = 1;
}

message JobInfoResponse {
    bool found = 1;
    JobContext job = 2;
    string error = 3;
}

// FUSE client management messages
message FuseClientsRequest {}

message FuseClientsResponse {
    message FuseClientInfo {
        string client_id = 1;
        string client_type = 2;
        string mount_point = 3;
        string collection = 4;
        string replication = 5;
        string host = 6;
        uint64 pid = 7;
        uint64 connected_at = 8;
        uint64 last_heartbeat = 9;
        uint64 dirty_chunks = 10;
        uint64 dirty_bytes = 11;
    }
    repeated FuseClientInfo clients = 1;
    string error = 2;
}

message DataCenterStats {
    string name = 1;
    uint64 node_count = 2;
    uint64 volume_count = 3;
    uint64 total_size = 4;
    uint64 used_size = 5;
}

message RackStats {
    string name = 1;
    string data_center = 2;
    uint64 node_count = 3;
    uint64 volume_count = 4;
    uint64 total_size = 5;
    uint64 used_size = 6;
}

// Raft service for multi-node communication
service RaftService {
    // Propose a command to the Raft cluster
    rpc Propose (ProposeRequest) returns (ProposeResponse);
    // Bidirectional streaming for Raft messages
    rpc RaftMessageStream (stream RaftMessage) returns (stream RaftMessage);
    // Send a single Raft message to a peer
    rpc SendRaftMessage (RaftMessage) returns (RaftMessageResponse);
    // Get cluster membership
    rpc GetClusterInfo (ClusterInfoRequest) returns (ClusterInfoResponse);
    // Add node to cluster
    rpc AddNode (AddNodeRequest) returns (AddNodeResponse);
    // Remove node from cluster
    rpc RemoveNode (RemoveNodeRequest) returns (RemoveNodeResponse);
    // Transfer leadership to another node
    rpc TransferLeader (TransferLeaderRequest) returns (TransferLeaderResponse);
}

message ProposeRequest {
    bytes command = 1;  // Serialized RaftCommand
}

message ProposeResponse {
    bool success = 1;
    string error = 2;
    uint64 index = 3;  // Log index after commit
}

message RaftMessage {
    uint64 from_id = 1;
    uint64 to_id = 2;
    bytes message = 3;  // Serialized raft::eraftpb::Message
}

message RaftMessageResponse {
    bool success = 1;
    string error = 2;
}

message ClusterInfoRequest {}

message ClusterInfoResponse {
    uint64 node_id = 1;
    string address = 2;
    bool is_leader = 3;
    uint64 term = 4;
    repeated string peers = 5;
}

message AddNodeRequest {
    uint64 node_id = 1;
    string address = 2;
}

message AddNodeResponse {
    bool success = 1;
    string error = 2;
}

message RemoveNodeRequest {
    uint64 node_id = 1;
}

message RemoveNodeResponse {
    bool success = 1;
    string error = 2;
}

message TransferLeaderRequest {
    uint64 target_node_id = 1;
}

message TransferLeaderResponse {
    bool success = 1;
    string error = 2;
}

// Filer metadata types
message FileChunk {
    uint64 offset = 1;
    uint64 size = 2;
    uint64 mtime = 3;
    string fid = 4;
    uint32 cookie = 5;
    uint32 crc32 = 6;
}

message FuseAttributes {
    uint64 ino = 1;
    uint32 mode = 2;
    uint32 nlink = 3;
    uint32 uid = 4;
    uint32 gid = 5;
    uint64 rdev = 6;
    uint64 size = 7;
    uint64 blksize = 8;
    uint64 blocks = 9;
    uint64 atime = 10;
    uint64 mtime = 11;
    uint64 ctime = 12;
    uint64 crtime = 13;
    uint32 perm = 14;
}

message Entry {
    string name = 1;
    string directory = 2;
    FuseAttributes attributes = 3;
    repeated FileChunk chunks = 4;
    string hard_link_id = 5;
    uint32 hard_link_counter = 6;
    map<string, bytes> extended = 7;
    uint64 content_size = 8;
    uint64 disk_size = 9;
    string ttl = 10;
    string symlink_target = 11;
    string owner = 12;  // 资源归属用户ID（空字符串表示无归属/系统资源）
    uint64 generation = 13;  // 代次号，每次元数据变更递增
}

enum StorageBackend {
    POWERFS_VOLUME = 0;
    S3 = 1;
    KV = 2;
    LOCAL_DISK = 3;
}

message ChunkLocation {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    uint32 cookie = 3;
    string fid = 4;
    string data_center = 5;
    string rack = 6;
    string node_address = 7;
}

message StripeInfo {
    uint32 stripe_index = 1;
    uint64 stripe_offset = 2;
    uint64 stripe_size = 3;
    uint32 volume_id = 4;
    uint64 file_key = 5;
}

message StripeConfig {
    uint64 stripe_size = 1;
    uint32 stripe_count = 2;
}

message S3Location {
    string bucket = 1;
    string key = 2;
    string region = 3;
    uint64 part_size = 4;
    repeated string part_etags = 5;
    string upload_id = 6;
    uint64 total_parts = 7;
}

message KVLocation {
    string table = 1;
    bytes key = 2;
    uint32 crc32 = 3;
}

message InodeEntry {
    uint64 ino = 1;
    string name = 2;
    uint64 parent_ino = 3;
    FuseAttributes attributes = 4;
    repeated FileChunk chunks = 5;
    string symlink_target = 6;
    string hard_link_id = 7;
    uint32 hard_link_counter = 8;
    uint64 generation = 9;
    map<string, bytes> extended = 10;
    uint64 content_size = 11;
    uint64 disk_size = 12;
    string ttl = 13;
    string owner = 14;
    StorageBackend backend = 15;
    S3Location s3_location = 16;
    KVLocation kv_location = 17;
    StripeConfig stripe_config = 18;
}

message DirEntry {
    uint64 parent_ino = 1;
    string name = 2;
    uint64 child_ino = 3;
    uint32 child_type = 4;
    uint32 mode = 5;
    uint64 size = 6;
    uint64 mtime = 7;
    uint32 nlink = 8;
}

message PathIndexEntry {
    uint64 ino = 1;
    uint64 parent_ino = 2;
    uint64 generation = 3;
}

message LookupDirectoryEntryRequest {
    uint64 parent_ino = 1;
    string name = 2;
}

message LookupDirectoryEntryResponse {
    bool found = 1;
    Entry entry = 2;
    string error = 3;
}

message GetEntryRequest {
    string path = 1;
}

message GetEntryResponse {
    bool found = 1;
    Entry entry = 2;
    string error = 3;
}

message GetEntryByInodeRequest {
    uint64 inode = 1;
}

message GetEntryByInodeResponse {
    bool found = 1;
    Entry entry = 2;
    string path = 3;
    string error = 4;
}

message CreateEntryRequest {
    Entry entry = 1;
    string client_id = 2;
}

message CreateEntryResponse {
    bool success = 1;
    string error = 2;
    uint64 inode = 3;
}

message UpdateEntryRequest {
    Entry entry = 1;
    string client_id = 2;
}

message UpdateEntryResponse {
    bool success = 1;
    string error = 2;
}

message DeleteEntryRequest {
    uint64 ino = 1;
    bool is_directory = 2;
    string client_id = 3;
}

message DeleteEntryResponse {
    bool success = 1;
    string error = 2;
}

message RenameEntryRequest {
    uint64 old_parent_ino = 1;
    string old_name = 2;
    uint64 new_parent_ino = 3;
    string new_name = 4;
    string client_id = 5;
}

message RenameEntryResponse {
    bool success = 1;
    string error = 2;
}

message ListEntriesRequest {
    uint64 parent_ino = 1;
    uint64 limit = 2;
    string last_name = 3;
}

message ListEntriesResponse {
    repeated Entry entries = 1;
    bool has_more = 2;
    string error = 3;
}

message MutateEntryRequest {
    oneof mutation {
        CreateEntryRequest create = 1;
        UpdateEntryRequest update = 2;
        DeleteEntryRequest delete = 3;
    }
}

message MutateEntryResponse {
    bool success = 1;
    string error = 2;
}

message SubscribeMetadataRequest {
    string path_prefix = 1;
}

message MetadataNotification {
    enum EventType {
        CREATE = 0;
        UPDATE = 1;
        DELETE = 2;
        RENAME = 3;
        JOB_COMPLETE = 4;
    }
    EventType event_type = 1;
    string path = 2;
    Entry entry = 3;
    uint64 timestamp = 4;
    uint64 generation = 5;  // 新的 generation 号
    string old_path = 6;    // RENAME 事件的旧路径
    uint64 epoch = 7;       // Master epoch for lease invalidation detection
    string job_id = 8;      // Job ID for job-level lease sharing
    string source_client_id = 9;  // Source client ID to suppress self-notifications
}

// KV Cache service for LLM inference KV cache management
service KVCacheService {
    rpc CreateSession (CreateSessionRequest) returns (CreateSessionResponse);
    rpc DeleteSession (DeleteSessionRequest) returns (DeleteSessionResponse);
    rpc GetSession (GetSessionRequest) returns (GetSessionResponse);
    rpc PutBlock (PutBlockRequest) returns (PutBlockResponse);
    rpc GetBlock (GetBlockRequest) returns (GetBlockResponse);
    rpc BatchPut (BatchPutRequest) returns (BatchPutResponse);
    rpc BatchGet (BatchGetRequest) returns (BatchGetResponse);
    rpc ListSessions (ListSessionsRequest) returns (ListSessionsResponse);
    rpc GetStats (GetStatsRequest) returns (GetStatsResponse);
    rpc CreateNamespace (CreateNamespaceRequest) returns (CreateNamespaceResponse);
    rpc ListNamespaces (ListNamespacesRequest) returns (ListNamespacesResponse);
    rpc GetNamespace (GetNamespaceRequest) returns (GetNamespaceResponse);
    rpc DeleteNamespace (DeleteNamespaceRequest) returns (DeleteNamespaceResponse);

    rpc KVPut (KVPutRequest) returns (KVResponse);
    rpc KVGet (KVGetRequest) returns (KVGetResponse);
    rpc KVDelete (KVDeleteRequest) returns (KVResponse);
    rpc KVExists (KVExistsRequest) returns (KVExistsResponse);
    rpc KVList (KVListRequest) returns (KVListResponse);
    rpc KVRemoveByRegex (KVRemoveByRegexRequest) returns (KVResponse);
    rpc KVRemoveAll (KVRemoveAllRequest) returns (KVResponse);
    rpc KVBatchPut (KVBatchPutRequest) returns (KVBatchResponse);
    rpc KVBatchGet (KVBatchGetRequest) returns (KVBatchGetResponse);
}

message CreateNamespaceRequest {
    string namespace_id = 1;
    string name = 2;
    string owner_id = 3;
}

message CreateNamespaceResponse {
    bool success = 1;
    string error = 2;
    string namespace_id = 3;
}

message ListNamespacesRequest {
    string owner_id = 1;
}

message ListNamespacesResponse {
    repeated KVNamespace namespaces = 1;
    string error = 2;
}

message GetNamespaceRequest {
    string namespace_id = 1;
    string owner_id = 2;
}

message GetNamespaceResponse {
    bool found = 1;
    KVNamespace namespace = 2;
    string error = 3;
}

message DeleteNamespaceRequest {
    string namespace_id = 1;
    string owner_id = 2;
}

message DeleteNamespaceResponse {
    bool success = 1;
    string error = 2;
}

message KVNamespace {
    string id = 1;
    string name = 2;
    string owner_id = 3;
    uint64 created_at = 4;
    uint64 updated_at = 5;
}

message CreateSessionRequest {
    string session_id = 1;
    string model_name = 2;
    uint32 num_layers = 3;
    uint32 num_heads = 4;
    uint32 head_dim = 5;
    string dtype = 6;
    uint64 ttl_seconds = 7;
    string owner_id = 8;
    string namespace_id = 9;
}

message CreateSessionResponse {
    bool success = 1;
    string error = 2;
}

message DeleteSessionRequest {
    string session_id = 1;
}

message DeleteSessionResponse {
    bool success = 1;
    string error = 2;
}

message GetSessionRequest {
    string session_id = 1;
}

message GetSessionResponse {
    bool exists = 1;
    string session_id = 2;
    string model_name = 3;
    uint32 num_layers = 4;
    uint64 num_blocks = 5;
    uint64 total_tokens = 6;
    uint64 used_bytes = 7;
}

message PutBlockRequest {
    string session_id = 1;
    uint32 layer_id = 2;
    uint32 num_tokens = 3;
    bytes data = 4;
}

message PutBlockResponse {
    bool success = 1;
    uint64 block_id = 2;
    string error = 3;
    string fid = 4;
}

message GetBlockRequest {
    uint64 block_id = 1;
}

message GetBlockResponse {
    bool found = 1;
    uint64 block_id = 2;
    uint32 layer_id = 3;
    uint32 num_tokens = 4;
    bytes data = 5;
    string error = 6;
    string fid = 7;
    repeated Location volume_locations = 8;
}

message BatchPutRequest {
    repeated PutBlockRequest blocks = 1;
}

message BatchPutResponse {
    repeated PutBlockResponse results = 1;
}

message BatchGetRequest {
    repeated uint64 block_ids = 1;
}

message BatchGetResponse {
    repeated GetBlockResponse blocks = 1;
}

message ListSessionsRequest {
    uint32 limit = 1;
    string prefix = 2;
}

message ListSessionsResponse {
    repeated string session_ids = 1;
    uint64 total = 2;
}

message GetStatsRequest {
}

message GetStatsResponse {
    uint64 total_blocks = 1;
    uint64 total_sessions = 2;
    uint64 used_memory_bytes = 3;
    uint64 max_memory_bytes = 4;
    uint64 cache_hits = 5;
    uint64 cache_misses = 6;
    uint64 evictions = 7;
}

message KVPutRequest {
    string namespace_id = 1;
    string key = 2;
    bytes value = 3;
    string owner_id = 4;
    uint64 ttl_seconds = 5;
}

message KVGetRequest {
    string namespace_id = 1;
    string key = 2;
}

message KVGetResponse {
    bool success = 1;
    string error = 2;
    bytes value = 3;
    bool found = 4;
}

message KVDeleteRequest {
    string namespace_id = 1;
    string key = 2;
}

message KVResponse {
    bool success = 1;
    string error = 2;
}

message KVExistsRequest {
    string namespace_id = 1;
    string key = 2;
}

message KVExistsResponse {
    bool exists = 1;
    string error = 2;
}

message KVListRequest {
    string namespace_id = 1;
    string prefix = 2;
}

message KVListResponse {
    repeated string keys = 1;
    string error = 2;
}

message KVRemoveByRegexRequest {
    string namespace_id = 1;
    string pattern = 2;
}

message KVRemoveAllRequest {
    string namespace_id = 1;
}

message KVBatchPutRequest {
    string namespace_id = 1;
    repeated string keys = 2;
    repeated bytes values = 3;
    string owner_id = 4;
}

message KVBatchResponse {
    repeated bool successes = 1;
    string error = 2;
}

message KVBatchGetRequest {
    string namespace_id = 1;
    repeated string keys = 2;
}

message KVBatchGetResponse {
    repeated bytes values = 1;
    repeated bool found = 2;
    string error = 3;
}

// ============================================================
// Delta sync types (Phase 1B)
// ============================================================

message VectorClockEntry {
    uint64 client_id = 1;
    uint64 seq = 2;
}

message VectorClock {
    repeated VectorClockEntry entries = 1;
}

message EntryId {
    string name = 1;
    uint64 client_id = 2;
    uint64 seq = 3;
}

message DirEntryOrset {
    EntryId id = 1;
    uint64 inode = 2;
    uint64 parent_ino = 3;
    uint32 mode = 4;
    uint64 size = 5;
    uint64 mtime = 6;
    uint64 atime = 7;
    uint64 ctime = 8;
    uint32 nlink = 9;
    string symlink_target = 10;
    uint32 file_type = 11;
}

message DeltaOp {
    oneof op {
        DirEntryOrset add = 1;
        EntryId remove = 2;
        RenameOp rename = 3;
        SetAttrOp set_attr = 4;
    }
    VectorClock vclock = 5;
}

message RenameOp {
    EntryId old_id = 1;
    DirEntryOrset new_entry = 2;
}

message SetAttrOp {
    uint64 inode = 1;
    uint64 size = 2;
    uint64 mtime = 3;
    uint32 mode = 4;
}

message PushDeltaRequest {
    string client_id = 1;
    repeated DeltaOp deltas = 2;
    VectorClock client_vclock = 3;
}

message PushDeltaResponse {
    bool success = 1;
    string error = 2;
    VectorClock server_vclock = 3;
}

message PullDeltaRequest {
    string client_id = 1;
    VectorClock client_vclock = 2;
}

message PullDeltaResponse {
    bool success = 1;
    string error = 2;
    repeated DeltaOp deltas = 3;
    VectorClock server_vclock = 4;
}