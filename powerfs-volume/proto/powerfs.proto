syntax = "proto3";

package powerfs;

service VolumeService {
    rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
    rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);
    rpc WriteNeedle(WriteNeedleRequest) returns (WriteNeedleResponse);
    rpc ReadNeedle(ReadNeedleRequest) returns (ReadNeedleResponse);
    rpc DeleteNeedle(DeleteNeedleRequest) returns (DeleteNeedleResponse);
    rpc RestoreNeedle(RestoreNeedleRequest) returns (RestoreNeedleResponse);
    rpc WormLock(WormLockRequest) returns (WormLockResponse);
    rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);
    rpc GetNodeInfo(GetNodeInfoRequest) returns (GetNodeInfoResponse);

    rpc WriteNeedleBlob(WriteNeedleBlobRequest) returns (WriteNeedleBlobResponse);
    rpc ReadNeedleBlob(ReadNeedleBlobRequest) returns (ReadNeedleBlobResponse);
    rpc BatchWriteNeedleBlob(BatchWriteNeedleBlobRequest) returns (BatchWriteNeedleBlobResponse);
    rpc ReadNeedleMeta(ReadNeedleMetaRequest) returns (ReadNeedleMetaResponse);
    rpc BatchDelete(BatchDeleteRequest) returns (BatchDeleteResponse);
    rpc VolumeStatus(VolumeStatusRequest) returns (VolumeStatusResponse);
}

message CreateVolumeRequest {
    uint32 volume_id = 1;
    uint64 size = 2;
}

message CreateVolumeResponse {
    bool success = 1;
    uint32 volume_id = 2;
}

message DeleteVolumeRequest {
    uint32 volume_id = 1;
}

message DeleteVolumeResponse {
    bool success = 1;
}

message WriteNeedleRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    bytes data = 3;
    uint32 cookie = 4;
    string ttl = 5;
}

message WriteNeedleResponse {
    bool success = 1;
    uint32 volume_id = 2;
    uint64 file_key = 3;
    uint64 offset = 4;
    uint32 cookie = 5;
}

message ReadNeedleRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    uint32 cookie = 3;
}

message ReadNeedleResponse {
    bool success = 1;
    bytes data = 2;
    uint32 cookie = 3;
    uint64 last_modified = 4;
}

message DeleteNeedleRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    uint32 cookie = 3;
}

message DeleteNeedleResponse {
    bool success = 1;
}

message RestoreNeedleRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    uint32 cookie = 3;
}

message RestoreNeedleResponse {
    bool success = 1;
}

message WormLockRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    uint32 cookie = 3;
    int64 retention_days = 4;
}

message WormLockResponse {
    bool success = 1;
    string retention_until = 2;
}

message ListVolumesRequest {}

message ListVolumesResponse {
    repeated VolumeInfo volumes = 1;
}

message VolumeInfo {
    uint32 volume_id = 1;
    string node_id = 2;
    uint64 size = 3;
    uint64 used = 4;
    uint32 replica_count = 5;
    int32 state = 6;
    uint64 next_file_key = 7;
    bool read_only = 8;
    string collection = 9;
    string replication = 10;
    string ttl = 11;
}

message GetNodeInfoRequest {}

message GetNodeInfoResponse {
    string node_id = 1;
    uint64 total_space = 2;
    uint64 used_space = 3;
    uint32 volume_count = 4;
}

message WriteNeedleBlobRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    int64 offset = 3;
    int32 size = 4;
    bytes needle_blob = 5;
    uint32 cookie = 6;
}

message WriteNeedleBlobResponse {
    bool success = 1;
}

message BatchWriteNeedleBlobRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    repeated NeedleBlobEntry entries = 3;
}

message NeedleBlobEntry {
    int64 offset = 1;
    int32 size = 2;
    bytes needle_blob = 3;
    uint32 cookie = 4;
}

message BatchWriteNeedleBlobResponse {
    bool success = 1;
    int32 success_count = 2;
}

message ReadNeedleBlobRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
    int64 offset = 3;
    int32 size = 4;
}

message ReadNeedleBlobResponse {
    bool success = 1;
    bytes needle_blob = 2;
}

message ReadNeedleMetaRequest {
    uint32 volume_id = 1;
    uint64 file_key = 2;
}

message ReadNeedleMetaResponse {
    bool success = 1;
    uint32 cookie = 2;
    uint64 last_modified = 3;
    uint32 crc = 4;
    string ttl = 5;
    uint64 append_at_ns = 6;
}

message BatchDeleteRequest {
    repeated string file_ids = 1;
    bool skip_cookie_check = 2;
}

message BatchDeleteResponse {
    repeated DeleteResult results = 1;
}

message DeleteResult {
    string file_id = 1;
    int32 status = 2;
    string error = 3;
    uint32 size = 4;
}

message VolumeStatusRequest {
    uint32 volume_id = 1;
}

message VolumeStatusResponse {
    bool success = 1;
    bool is_read_only = 2;
    uint64 volume_size = 3;
    uint64 file_count = 4;
    uint64 file_deleted_count = 5;
}